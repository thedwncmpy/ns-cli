name: CI

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to bump in tap (example: v0.1.9)"
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout homebrew formula repo
        uses: actions/checkout@v4
        with:
          repository: thedwncmpy/homebrew-notion-cli
          path: homebrew-notion-cli
      - name: Link formula repo at expected sibling path
        run: ln -s "$GITHUB_WORKSPACE/homebrew-notion-cli" "$GITHUB_WORKSPACE/../homebrew-notion-cli"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh jq shellcheck python3
      - name: Syntax and lint
        run: |
          zsh -n lib/notion_cli.zsh
          zsh -n lib/common.zsh
          zsh -n lib/notion_api.zsh
          zsh -n lib/config.zsh
          zsh -n lib/relation_resolver.zsh
          zsh -n lib/migrations.zsh
          shellcheck -s bash tests/*.sh
      - name: Run contract tests
        run: |
          ./tests/test_slice1_router.sh
          ./tests/test_slice2_init.sh
          ./tests/test_slice3_link.sh
          ./tests/test_slice4_credentials.sh
          ./tests/test_slice5_upload.sh
          ./tests/test_slice6_download.sh
          ./tests/test_slice7_roundtrip_contract.sh
          ./tests/test_slice8_homebrew.sh
          ./tests/test_slice10_reliability.sh
          ./tests/test_slice11_p3.sh
          ./tests/test_slice12_status_completion.sh

  bump-homebrew-tap:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: thedwncmpy/homebrew-notion-cli
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-notion-cli

      - name: Update formula url/version/sha256
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ -z "${TAG}" ]]; then
            echo "Error: TAG is required. Provide workflow_dispatch input 'release_tag' (example: v0.1.9)."
            exit 1
          fi
          FORMULA="homebrew-notion-cli/Formula/ns.rb"
          TARBALL_URL="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          SHA="$(curl -fsSL "$TARBALL_URL" | sha256sum | awk '{print $1}')"
          VERSION="${TAG#v}"

          sed -i "s|^\s*url \".*\"|  url \"$TARBALL_URL\"|" "$FORMULA"
          sed -i "s|^\s*version \".*\"|  version \"$VERSION\"|" "$FORMULA"
          sed -i "s|^\s*sha256 \".*\"|  sha256 \"$SHA\"|" "$FORMULA"

      - name: Create pull request in tap repo
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-notion-cli
          commit-message: "chore: bump ns formula to ${{ github.event.release.tag_name }}"
          branch: "chore/bump-ns-${{ github.event.release.tag_name }}"
          title: "chore: bump ns to ${{ github.event.release.tag_name }}"
          body: |
            Auto-generated from release `${{ github.event.release.tag_name }}` in `${{ github.repository }}`.
          add-paths: |
            Formula/ns.rb
